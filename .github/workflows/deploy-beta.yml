name: Deploy Beta

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: veversal-beta-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          for var in SSH_HOST SSH_PORT SSH_USER SSH_PRIVATE_KEY; do
            if [[ -z "${!var:-}" ]]; then
              echo "::error::Missing GitHub secret: $var"
              exit 1
            fi
          done
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Verify SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key \
            -p "$SSH_PORT" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$SSH_USER@$SSH_HOST" \
            'echo SSH OK'

      - name: Deploy beta (frontend only)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          echo "Frontend deploy triggered by ${GITHUB_EVENT_NAME:-unknown} from ${GITHUB_REPOSITORY}@${GITHUB_SHA:0:7}"
          ssh -i ~/.ssh/deploy_key \
            -p "$SSH_PORT" \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$SSH_USER@$SSH_HOST" \
            "set -euo pipefail
             export GITHUB_REPOSITORY='${GITHUB_REPOSITORY}'
             export GITHUB_SHA='${GITHUB_SHA}'
             cd /opt/veversal/backend
             echo '==> Sync deploy scripts from origin/main'
             git fetch origin main
             git checkout main
             git reset --hard origin/main
             echo \"==> Deploy scripts at: \$(git log -1 --oneline)\"
             exec bash deploy/deploy_frontend_beta.sh" \
            || {
              echo "::error::Remote deploy_frontend_beta.sh failed (repo=${GITHUB_REPOSITORY} sha=${GITHUB_SHA:0:7})."
              echo "::error::Recovery: SSH to server and run: cd /opt/veversal/backend && git pull && bash deploy/deploy_frontend_beta.sh"
              exit 1
            }
